examples_readme:
  readme_template: docs/example_readme.md
  skip_examples: []
  code_snippet_files:
    additional: []
  template_vars:
    production_considerations_comment: ""
    production_considerations: ""
    skip_if_name_contains: []
  versions_tf:
    add: |
      provider "mongodbatlas" {}
    skip_if_name_contains: ["cluster destruction"]
    generate_when_missing_only: false
    force_generate: false

tables:
  - name: Examples
    intro: |
      The following examples show common configurations you can copy and adapt. Start with the [basic example](./examples/basic) for a minimal setup. To manage features on an existing Atlas project without taking over the project resource, see the [reference mode example](./examples/reference_mode).
    columns: ["feature", "name"]
    link_column: name
    example_rows:
      - folder_name: reference_mode
        feature: Reference Mode
        name: Reference Mode (Existing Project)
        description: The Reference Mode example manages standalone resources of an existing Atlas project without managing the project resource.
      - folder_name: basic
        feature: Basic Project Setup
        name: Basic Project with Settings and Limits
        description: The Basic Project example creates an Atlas project with custom settings, limits, an IP access list, and tags.
      - folder_name: prod_secure_baseline
        feature: Production Baseline
        name: Production Secure Baseline with Maintenance Window
        description: The Production Secure Baseline example creates a project with restrictive settings, higher limits, and a maintenance window with protected hours.
      - folder_name: alerts
        feature: Alert Configuration
        name: Alert Configuration for a Module-managed Project
        description: The Alert Configuration example creates alert configurations alongside a module-managed project. The two alerts included in the example ("No partition" and "Disk partition usage") are based on the [MongoDB Atlas recommended alert configurations](https://www.mongodb.com/docs/atlas/architecture/current/monitoring-alerts/).
      - folder_name: log_integration
        feature: Log Integration
        name: Log Integration with Datadog, Splunk, and OTel
        description: The Log Integration example exports Atlas logs to Datadog, Splunk, and an OpenTelemetry collector.
      - folder_name: all_enabled
        feature: All Features Enabled
        name: All Features Enabled
        description: The All Features Enabled example creates an Atlas project with all the features enabled.
      - folder_name: all_disabled
        feature: All Features Disabled
        name: All Features Disabled
        description: The All Features Disabled example creates an Atlas project with all the features disabled.
      - folder_name: bcp_cluster_destroy
        feature: Cluster Destruction with BCP
        name: Cluster Destruction with Backup Compliance Policy (BCP)
        description: The Cluster Destruction with [Backup Compliance Policy](https://www.mongodb.com/docs/atlas/backup/cloud-backup/backup-compliance-policy/) example shows how to destroy a cluster when a BCP is active using the `skip_destroy` flag on the [backup schedule resource](https://registry.terraform.io/providers/mongodb/mongodbatlas/latest/docs/resources/cloud_backup_schedule). An active BCP prevents the deletion of backup schedules. Setting `skip_destroy = true` on the schedule resource removes it from the Terraform state on destroy without calling the Atlas API. The schedule is then removed in Atlas together with the cluster.
